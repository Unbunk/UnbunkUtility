name: Package and release

# On every version tag (v*), the BigWigs packager builds the addon from .pkgmeta:
#   - substitutes @project-version@ (and friends) from the tag,
#   - creates the GitHub release with an auto-generated changelog,
#   - attaches a clean `UnbunkUtility.zip` (root folder `UnbunkUtility/`, via -n "{package-name}"),
#   - uploads to CurseForge / Wago / WoWInterface when the project IDs (.toc `## X-*-ID:`) and the
#     matching API-token secrets are present (each platform is skipped if its token/ID is missing).
#
# Required repo secrets for the addon-site uploads (GitHub upload uses the built-in token):
#   CF_API_KEY       - CurseForge API token
#   WAGO_API_TOKEN   - Wago API token
#   WOWI_API_TOKEN   - WoWInterface API token

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # let the built-in token create the release + upload assets

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          args: -n "{package-name}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
