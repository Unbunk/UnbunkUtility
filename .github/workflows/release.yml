name: Package and release

# On every version tag (v*):
#   1. BigWigsMods/packager builds the addon from .pkgmeta (substitutes @project-version@, makes a clean
#      `UnbunkUtility.zip` via -n "{package-name}") and uploads it to CurseForge / Wago / WoWInterface
#      (each skipped if its .toc `## X-*-ID:` or API-token secret is missing).
#   2. A separate step creates the GitHub release with auto-generated notes and attaches the same zip —
#      the packager does NOT touch GitHub releases itself, so this step is what puts the build on GitHub.
#
# Required repo secrets for the addon-site uploads (GitHub upload uses the built-in token):
#   CF_API_KEY       - CurseForge API token
#   WAGO_API_TOKEN   - Wago API token
#   WOWI_API_TOKEN   - WoWInterface API token

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release + upload assets

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the changelog)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Package + upload to CurseForge / Wago / WoWInterface
        uses: BigWigsMods/packager@v2
        with:
          args: -n "{package-name}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="${GITHUB_REF_NAME#v}"                       # release title without the leading v
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease" ;; esac   # v1.2.3-alpha1 -> prerelease
          gh release create "$GITHUB_REF_NAME" .release/UnbunkUtility.zip \
            --title "$title" \
            --generate-notes $prerelease
